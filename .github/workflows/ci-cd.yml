name: Amazon Clone CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Backend ────────────────────────────────────────────
  backend-build:
    name: 🔧 Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./amazon-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: amazon-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

  # ─── Frontend ───────────────────────────────────────────
  frontend-build:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./amazon-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: amazon-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

  # ─── Docker ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./amazon-backend
          push: false
          tags: amazon-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./amazon-frontend
          push: false
          tags: amazon-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose config
        run: docker compose config
